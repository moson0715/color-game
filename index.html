<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色形容詞互動實驗室</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f6f8; padding: 20px; color: #333; }
        .section { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 30px; text-align: center; width: 440px; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 第一部分樣式 */
        .shortcut-group { margin: 15px 0; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #eee; cursor: pointer; }
        .canvas-container { position: relative; width: 400px; height: 400px; background: #fff; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; cursor: crosshair; margin: 0 auto; }
        .axis { position: absolute; background: #eee; pointer-events: none; }
        .axis-h { top: 50%; left: 0; width: 100%; height: 1px; }
        .axis-v { left: 50%; top: 0; width: 1px; height: 100%; }
        .label { position: absolute; font-weight: bold; color: #aaa; font-size: 12px; pointer-events: none; }
        #colorPoint { width: 60px; height: 60px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: none; }

        /* 第二部分樣式 */
        .quick-palette { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .mini-btn { padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; font-size: 11px; cursor: pointer; background: white; }
        .color-card { width: 100%; height: 120px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.5); font-weight: bold; transition: background 0.3s; border: 1px solid rgba(0,0,0,0.1); font-size: 26px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; max-height: 120px; overflow-y: auto; padding: 10px; border-top: 1px solid #eee; }
        .chip { display: flex; align-items: center; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #ddd; cursor: pointer; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        /* 第三部分樣式 */
        .pure-card { width: 100%; height: 150px; border-radius: 12px; transition: background 0.3s; border: 1px solid rgba(0,0,0,0.1); }
        .btn-random { background: #2c3e50; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="section">
        <h3>1. 象限探索 (中心為原色)</h3>
        <div class="shortcut-group">
            <div class="color-btn" style="background: #FF0000;" onclick="setBaseColor('#FF0000')"></div>
            <div class="color-btn" style="background: #00FF00;" onclick="setBaseColor('#00FF00')"></div>
            <div class="color-btn" style="background: #0000FF;" onclick="setBaseColor('#0000FF')"></div>
            <input type="color" id="baseColor" value="#FF0000">
        </div>
        <div id="statusText" style="margin-bottom: 10px; font-weight: bold; height: 20px; font-size: 14px;">Normal (原色)</div>
        <div class="canvas-container" id="area">
            <div class="axis axis-h"></div><div class="axis axis-v"></div>
            <div class="label" style="top:8px; left:50%; transform:translateX(-50%)">LIGHT</div>
            <div class="label" style="bottom:8px; left:50%; transform:translateX(-50%)">DARK</div>
            <div class="label" style="left:8px; top:50%; transform:translateY(-50%)">PALE</div>
            <div class="label" style="right:8px; top:50%; transform:translateY(-50%)">DEEP</div>
            <div id="colorPoint"></div>
        </div>
    </div>

    <div class="section">
        <h3>2. 顏色單字提取</h3>
        <div class="quick-palette" id="quickPalette"></div>
        <input type="text" id="wordInput" placeholder="輸入名稱..." autocomplete="off" style="padding:10px; width:280px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px;">
        <div id="wordCard" class="color-card" style="background: #eee;">
            <div id="wordCardText">WAITING...</div>
        </div>
        <div class="history-list" id="wordHistory"></div>
    </div>

    <div class="section">
        <h3>3. 隨機列舉顏色</h3>
        <button class="btn-random" onclick="pickRandomFromList()">隨機選取</button>
        <div id="randomPureCard" class="pure-card" style="background: #eee;"></div>
    </div>

    <script>
        const customColors = {
            'pink': '#ffb3e6', 'coral': '#fd7c6e', 'violet': '#7C266D', 
            'indigo': '#2e006c', 'brown': '#644117', 'purple': '#8A2BE2'
        };
        const colorList = ['black','gray','silver','white','beige','gold','brown','red','orange','yellow','green','blue','indigo','violet','pink','coral','olive','navy','purple'];

        // --- 第一部分邏輯 ---
        const area = document.getElementById('area');
        const point = document.getElementById('colorPoint');
        const statusText = document.getElementById('statusText');
        const baseColorInput = document.getElementById('baseColor');
        function setBaseColor(hex) { baseColorInput.value = hex; }
        area.addEventListener('mousemove', (e) => {
            const rect = area.getBoundingClientRect();
            const px = (e.clientX - rect.left) / rect.width;
            const py = (e.clientY - rect.top) / rect.height;
            point.style.backgroundColor = baseColorInput.value;
            point.style.filter = `saturate(${px * 200}%) brightness(${(1 - py) * 200}%)`;
            point.style.left = (px * 100) + '%';
            point.style.top = (py * 100) + '%';
            let word = "Normal";
            if (px > 0.7 && py > 0.7) word = "Deep";
            else if (px < 0.3 && py < 0.3) word = "Pale";
            else if (py < 0.3) word = "Light";
            else if (py > 0.7) word = "Dark";
            statusText.innerText = word;
        });

        // --- 第二部分邏輯 ---
        const wordCard = document.getElementById('wordCard');
        const wordCardText = document.getElementById('wordCardText');
        const wordHistory = document.getElementById('wordHistory');
        const wordRecorded = new Set();
        document.getElementById('quickPalette').innerHTML = colorList.map(c => 
            `<button class="mini-btn" onclick="updateWordDisplay('${c}')">${c}</button>`).join('');

        function updateWordDisplay(name) {
            const clean = name.toLowerCase().trim();
            const colorValue = customColors[clean] || clean;
            const s = new Option().style; s.color = colorValue;
            if (s.color !== "") {
                wordCard.style.backgroundColor = colorValue;
                wordCardText.innerText = name.toUpperCase();
                wordCard.style.color = ['white','silver','yellow','beige'].includes(clean) ? '#333' : 'white';
                if (!wordRecorded.has(clean)) {
                    wordRecorded.add(clean);
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.innerHTML = `<div class="dot" style="background:${colorValue}"></div>${name}`;
                    chip.onclick = () => updateWordDisplay(name);
                    wordHistory.prepend(chip);
                }
            }
        }
        document.getElementById('wordInput').addEventListener('input', function() { updateWordDisplay(this.value); });

        // --- 第三部分邏輯 ---
        function pickRandomFromList() {
            const picked = colorList[Math.floor(Math.random() * colorList.length)];
            document.getElementById('randomPureCard').style.backgroundColor = customColors[picked] || picked;
        }
    </script>
</body>
</html>
